<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>
<div id="coins"></div>

<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">Devving</button>
  <button class="theme-btn" id="add-coins-btn">+0.10 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">Charity </button>
  <button class="theme-btn" id="switch-gamemode-btn">Switch to Coinflip</button>
</div>

<!-- CASE SECTION -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Potential Drops</button>
    <div id="case-items-list"></div>
  </div>
</div>

<div id="winner-name"></div>

<!-- Spinner -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
    <div id="spinner-center-bar"></div>
  </div>
</div>

<!-- COINFLIP SECTION -->
<div id="coinflip-section" class="hidden">
  <h2>Coinflip</h2>
  <select id="coinflip-item-select"></select>
  <div id="coinflip-choice" style="margin:10px 0;"></div>
  <div id="coinflip-preview" style="display:flex; gap:20px; justify-content:center; margin:10px 0;"></div>
  <button class="theme-btn" id="coinflip-btn">Flip!</button>
  <div id="coinflip-result"></div>
</div>

<h2>Inventory</h2>
<div id="inventory" class="hidden"></div>

<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<script src="script.js"></script>
</body>
</html>
