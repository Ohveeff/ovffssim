<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TF2 Case Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>TF2 Case Opening Simulator</h1>

  <!-- Coins Display -->
  <div id="coins"></div>

  <!-- Case Selection Menu -->
  <div id="case-menu">
    <label for="case-select">Select Case:</label>
    <select id="case-select"></select>
  </div>

  <!-- Case -->
  <div id="case-container"></div>
  <button id="open-btn">Open Case</button>
  
  <!-- Spinner Wrapper -->
  <div id="spinner-wrapper">
    <div class="winner-arrow" id="winner-left">&#10094;</div>
    <div class="winner-arrow" id="winner-right">&#10095;</div>
    <div id="spinner-container">
      <div id="spinner-strip"></div>
    </div>
  </div>

  <!-- Result of the case opening -->
  <div id="result"></div>

  <!-- Inventory -->
  <h2>Inventory</h2>
  <div id="inventory"></div>

  <script src="script.js"></script>
</body>
</html>
