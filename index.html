<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case & Coinflip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Case & Coinflip Site</h1>
  <div id="coins">Coins: 0</div>

  <button class="theme-btn" id="toggle-inv-btn">Toggle Inventory</button>
  <button class="theme-btn" id="toggle-section-btn">Toggle Cases / Coinflip</button>
  <button class="theme-btn" id="sell-all-btn">Sell All Items</button>

  <div id="inventory" class="hidden"></div>

  <!-- CASE SECTION -->
  <div id="case-section" class="section-container">
    <div class="case-left">
      <img id="case-image" src="">
    </div>
    <div class="case-right">
      <select id="case-select"></select>
      <h2 id="case-name"></h2>
      <button class="theme-btn" id="open-btn"></button>
      <div id="case-items-list"></div>
    </div>
  </div>

  <!-- COINFLIP SECTION -->
  <div id="coinflip-section" class="section-container hidden">
    <div id="betOptions"></div>
    <div id="coin-area">
      <div id="coin">🪙</div>
    </div>
    <button class="theme-btn" onclick="startCoinflip()">Start Coinflip</button>
    <div id="coinflipPool"></div>
  </div>

<script src="script.js"></script>
</body>
</html>
