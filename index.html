<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<!-- Neon New Banner -->
<div id="neon-banner">New: COINFLIP / CASE BATTLE</div>

<!-- Coins Display -->
<div id="coins"></div>

<!-- Controls -->
<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">devving</button>
  <button class="theme-btn" id="add-coins-btn">+50 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">Donate To Charity</button>
  <button class="theme-btn" id="toggle-mode-btn">Switch to Case Battle</button>
</div>

<!-- ================= CASE / COINFLIP SECTION ================= -->
<div id="main-section">

  <!-- Coinflip Section -->
  <div id="coinflip-section">
    <h2>Coinflip</h2>
    <select id="coinflip-select"></select>
    <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
    <div id="coin-container">
      <div id="coin" class="head">
        <img src="images/items/coin-head.png" alt="Coin Head">
      </div>
    </div>
  </div>

  <!-- Case selection -->
  <div id="case-select-wrapper">
    <div class="custom-dropdown">
      <div id="case-select-display"></div>
      <div id="case-select-options"></div>
    </div>
  </div>

  <!-- Case section -->
  <div id="case-section">
    <div class="case-left">
      <img id="case-image" src="" alt="Case Image">
    </div>
    <div class="case-right">
      <h2 id="case-name"></h2>
      <button class="theme-btn" id="open-btn"></button>
      <button class="theme-btn" id="show-case-items-btn">Show Potential Items</button>
      <div id="case-items-list"></div>
    </div>
  </div>

</div>

<!-- ================= CASE BATTLE SECTION ================= -->
<div id="battle-section" style="display:none;">
  <h2>Case Battle</h2>
  <div id="battle-select-wrapper">
    <div class="custom-dropdown">
      <div id="battle-case-select-display"></div>
      <div id="battle-case-select-options"></div>
    </div>
    <button id="battle-btn" class="theme-btn">Start Battle</button>
  </div>

  <div id="battle-spinners" style="display:flex; justify-content:center; gap:50px; margin-top:20px;">
    <div>
      <h3>Player</h3>
      <div id="battle-spinner-player-container">
        <div id="battle-spinner-player-strip"></div>
      </div>
    </div>
    <div>
      <h3>Bot</h3>
      <div id="battle-spinner-bot-container">
        <div id="battle-spinner-bot-strip"></div>
      </div>
    </div>
  </div>

  <div id="battle-winner-name" style="margin-top:20px; font-size:22px; font-weight:bold;"></div>
</div>

<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Inventory</h2>
  <button id="sell-all-btn" class="theme-btn">Sell All</button>
</div>
<div id="inventory"></div>

<!-- Top Drops -->
<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
