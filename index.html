<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<!-- Neon New Banner -->
<div id="neon-banner">New: COINFLIP & BATTLE</div>

<!-- Coins Display -->
<div id="coins"></div>

<!-- Controls -->
<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">devving</button>
  <button class="theme-btn" id="add-coins-btn">+50 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">Donate To Charity</button>
  <button class="theme-btn" id="toggle-battle-btn">Toggle Battle Mode</button>
</div>

<!-- ================= MAIN SECTION ================= -->
<div id="main-section">

  <!-- Coinflip Section -->
  <div id="coinflip-section">
    <h2>Coinflip</h2>
    <select id="coinflip-select"></select>
    <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
    <div id="coin-container">
      <div id="coin">
        <div class="head"></div>
        <div class="tail"></div>
      </div>
    </div>
  </div>

  <!-- Case selection -->
  <div class="custom-dropdown" id="case-select-wrapper">
    <div id="case-select-display"></div>
    <div id="case-select-options"></div>
  </div>

  <!-- Case section -->
  <div id="case-section">
    <div class="case-left">
      <img id="case-image" src="" alt="Case Image">
    </div>
    <div class="case-right">
      <h2 id="case-name"></h2>
      <button class="theme-btn" id="open-btn"></button>
      <button class="theme-btn" id="show-case-items-btn">Show Potential Items</button>
      <div id="case-items-list"></div>
    </div>
  </div>

</div>

<!-- ================= CASE BATTLE SECTION ================= -->
<div id="battle-section" style="display:none;">
  <h2>Case Battle Mode</h2>
  <div id="battle-spinners" style="display:flex; justify-content:center; gap:40px;">
    <div>
      <h3>Player</h3>
      <div id="battle-player-strip" style="width:400px; height:170px; overflow:hidden; border:2px solid #333; border-radius:15px; background:rgba(20,20,25,0.9);"></div>
    </div>
    <div>
      <h3>Bot</h3>
      <div id="battle-bot-strip" style="width:400px; height:170px; overflow:hidden; border:2px solid #333; border-radius:15px; background:rgba(20,20,25,0.9);"></div>
    </div>
  </div>
  <button class="theme-btn" id="start-battle-btn">Start Case Battle</button>
</div>

<!-- Winner Name -->
<div id="winner-name"></div>

<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Inventory</h2>
  <button id="sell-all-btn" class="theme-btn">Sell All</button>
</div>
<div id="inventory"></div>

<!-- Top Drops -->
<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<!-- JS -->
<script src="script.js"></script>
</body>
</html>
