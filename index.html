<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TF2 Case Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>TF2 Case Opening Simulator</h1>

  <!-- Coins Display -->
  <div id="coins"></div>
  <button id="add50">+50 Coins</button>
  <button id="remove50">-50 Coins</button>

  <!-- Case Selection -->
  <div id="case-selection">
    <label for="case-menu">Select Case:</label>
    <select id="case-menu"></select>
  </div>

  <!-- Case Display -->
  <div id="case-container"></div>
  <button id="open-btn">Open Case</button>
  <button id="toggle-inventory">Toggle Inventory</button>

  <!-- Spinner wrapper with arrows -->
  <div id="spinner-wrapper">
    <div id="winner-left">⮜</div>
    <div id="winner-right">⮞</div>
    <div id="spinner-container">
      <div id="spinner-strip"></div>
    </div>
  </div>

  <!-- Result of the case opening -->
  <div id="result"></div>

  <!-- Inventory -->
  <h2>Inventory</h2>
  <div id="inventory"></div>

  <script src="script.js"></script>
</body>
</html>
