<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OVFF's Sim</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>OVFF's Sim</h1>

<div id="coins"></div>

<div id="controls">
  <button class="theme-btn" id="toggle-inv-btn">Inventory</button>
  <button class="theme-btn" id="add-coins-btn">+10.01 Coins</button>
  <button class="theme-btn" id="remove-coins-btn">-5.00 Coins</button>
</div>

<!-- Case selection -->
<div id="case-select-wrapper">
  <select id="case-select"></select>
</div>

<!-- Case section -->
<div id="case-section">
  <div class="case-left">
    <img id="case-image" src="" alt="Case Image">
  </div>
  <div class="case-right">
    <h2 id="case-name"></h2>
    <button class="theme-btn" id="open-btn"></button>
    <button class="theme-btn" id="show-case-items-btn">Show Case Items</button>
    <div id="case-items-list"></div>
  </div>
</div>

<div id="winner-name"></div>

<!-- Spinner -->
<div id="spinner-wrapper">
  <div id="spinner-container">
    <div id="spinner-strip"></div>
  </div>
</div>

<!-- Inventory Section -->
<div class="inventory-header">
  <h2>Inventory</h2>
  <button id="sell-all-btn" class="theme-btn">Sell All</button>
</div>

<div id="inventory" class="hidden"></div>

<h2 class="top-title">• Last TOP Drops</h2>
<div id="top-drops"></div>

<script src="script.js"></script>
</body>
</html>

<div id="coinflip-section" style="margin-top:30px;">
  <h2>Coinflip 🎲</h2>
  <input type="number" id="bet-amount" placeholder="Bet amount" style="width:100px; padding:5px;">
  <select id="bet-choice" style="padding:5px;">
    <option value="heads">Heads</option>
    <option value="tails">Tails</option>
  </select>
  <button id="coinflip-btn" class="theme-btn">Flip Coin</button>
  <div id="coinflip-result" style="margin-top:15px; font-weight:bold;"></div>
  <div id="coinflip-animation" style="margin-top:10px; height:100px;"></div>
</div>
