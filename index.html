<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVFF's Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>OVFF's Sim</h1>
        <div class="mode-toggle">
            <button id="toggle-mode">Switch to Coinflip</button>
        </div>
    </header>

    <main>
        <!-- Inventory Section -->
        <section id="inventory">
            <h2>Inventory</h2>
            <div id="inventory-items" class="items-grid">
                <!-- Items dynamically added here -->
            </div>
        </section>

        <!-- Case Opening Section -->
        <section id="case-section">
            <h2>Cases</h2>
            <div id="case-selector">
                <!-- Cases dynamically loaded here -->
            </div>
            <div id="case-spinner-container">
                <div id="case-spinner">
                    <!-- Spinner items dynamically added here -->
                </div>
                <button id="open-case">Open Case</button>
            </div>
            <div id="top-drops">
                <h3>Latest TOP Drops</h3>
                <div class="items-grid" id="top-drops-grid"></div>
            </div>
        </section>

        <!-- Coinflip Section -->
        <section id="coinflip-section" style="display:none;">
            <h2>Coinflip</h2>
            <div id="coinflip-inventory" class="items-grid">
                <!-- Items to wager dynamically added here -->
            </div>
            <div id="coinflip-controls">
                <p>Select your item and choose heads or tails:</p>
                <button class="coin-choice" data-side="heads">Heads</button>
                <button class="coin-choice" data-side="tails">Tails</button>
            </div>
            <div id="coinflip-result"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 OVFF's Sim</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
